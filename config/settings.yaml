# PBA X → Toss auto-sync settings

pba:
  username: "801010athlete"  # https://x.com/801010athlete
  include_replies: false  # 본문 게시글만 (댓글/리플라이 제외)

# X 수집: browser = Playwright+내 계정(구독글 포함), api = 공식 API(공개글만)
x:
  source: browser
  poll_interval_sec: 25
  session_file: "${HOME}/.config/pba-toss-sync/x-storage-state.json"
  headless: true
  scroll_rounds: 25      # analyze/backfill 시 스크롤 횟수
  scroll_delay_sec: 1.5
  include_superfollows: true  # https://x.com/USER/superfollows 구독 글도 수집

llm:
  # provider: agy (local Antigravity CLI) | vllm | gemini | auto
  provider: "agy"
  agy_model: ""   # optional: agy --model (empty = CLI default)
  model: "gemini-2.5-flash"  # used only when provider=gemini
  confidence_threshold: 0.85
  cache_only: false
  persistent_cache: true   # analyze 재실행 시 tweet_id별 LLM 결과 SQLite 재사용

trading:
  broker: alpaca  # tossctl | alpaca
  dry_run: false  # alpaca paper = 실제 페이퍼 주문
  live_trading_enabled: true  # alpaca 주문 허용 (paper 계좌)
  market: "us"
  use_fractional_buy: true
  min_order_krw: 100  # alpaca: USD 최소 주문 ($100)
  max_position_pct: 15.0
  daily_buy_limit_krw: 50000  # alpaca: USD 일일 매수 한도 ($50k)
  rebalance_tolerance_pct: 1.0  # skip if within 1% of target
  limit_buy_buffer_pct: 0.15   # limit buy = ask + 0.15%
  limit_sell_buffer_pct: 0.15  # limit sell = bid - 0.15%

alpaca:
  paper: true
  extended_hours: true   # 프리/애프터마켓 limit 주문
  limit_orders_only: false  # false=정규장 시장가, 프리/애프터 limit (트윗 가격 미사용)
  # base_url: ""  # empty = paper-api.alpaca.markets
  data_url: "https://data.alpaca.markets"

stop_monitor:
  poll_interval_sec: 10
  sell_price_buffer_pct: 0.5  # sell limit slightly below stop

# Toss 실계좌용 (현재 미연동 — broker는 alpaca 유지)
tossctl:
  binary: "${HOME}/.local/bin/tossctl"
  config_dir: "config/tossctl"  # 프로젝트 로컬 gates (allow_live_order_actions=false)
  # 연동 시: bash scripts/prepare_toss.sh → auth login → broker: tossctl

notifications:
  telegram_enabled: false

logging:
  audit_dir: "logs/audit"
